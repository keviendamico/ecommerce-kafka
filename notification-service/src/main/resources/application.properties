spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=it.kevien.demo.sharedevents.model.inventory,it.kevien.demo.sharedevents.model.payment
spring.kafka.consumer.auto-offset-reset=earliest
spring.mail.host=localhost
spring.mail.port=1025
app.kafka.inventory.stock-failed-topic=stock.failed
app.kafka.notification.group-id=notification-group
app.kafka.payment.payment-confirmed-topic=payment.confirmed
app.kafka.payment.payment-failed-topic=payment.failed
